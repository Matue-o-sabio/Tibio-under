<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morioh Bizarre Adventure - JoJo Parte 4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            color: #ffd700;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">
        WASD: Mover | Mouse: Mirar | Clique: Ataque M1 | Q: Stand | E: Barrage | R: Heavy Punch<br>
        Z/X: Habilidades | Espaço: Dash | F: Interagir com NPC
    </div>

    <script>
        // ============ CONFIGURAÇÃO DO CANVAS ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        // ============ VARIÁVEIS GLOBAIS ============
        let mouse = { x: 400, y: 300, down: false };
        let keys = {};
        let dialogueText = '';
        let dialogueTimer = 0;

        // ============ CLASSES DO JOGO ============
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 3;
                this.radius = 20;
                this.hp = 100;
                this.maxHp = 100;
                this.stamina = 100;
                this.maxStamina = 100;
                this.level = 1;
                this.exp = 0;
                this.yen = 100;
                this.standActive = false;
                this.currentStand = null;
                this.inventory = ['Stand Arrow']; // Começa com uma flecha
                this.attacking = false;
                this.attackCooldown = 0;
                this.dashing = false;
                this.dashCooldown = 0;
                this.barraging = false;
                this.barrageTimer = 0;
                this.invulnerable = false;
                this.invulnerableTimer = 0;
                this.direction = 0; // Ângulo do mouse
            }

            update() {
                // Timer de invulnerabilidade
                if (this.invulnerable) {
                    this.invulnerableTimer--;
                    if (this.invulnerableTimer <= 0) this.invulnerable = false;
                }

                // Cooldowns
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.dashCooldown > 0) this.dashCooldown--;
                if (this.barrageTimer > 0) {
                    this.barrageTimer--;
                    if (this.barrageTimer <= 0) this.barraging = false;
                }

                // Regeneração de stamina
                if (!this.dashing && this.stamina < this.maxStamina) {
                    this.stamina += 0.2;
                }

                // Movimento
                if (!this.barraging) {
                    let dx = 0, dy = 0;
                    if (keys['w'] || keys['arrowup']) dy -= 1;
                    if (keys['s'] || keys['arrowdown']) dy += 1;
                    if (keys['a'] || keys['arrowleft']) dx -= 1;
                    if (keys['d'] || keys['arrowright']) dx += 1;

                    // Normalização
                    if (dx !== 0 && dy !== 0) {
                        dx *= 0.707;
                        dy *= 0.707;
                    }

                    if (this.dashing) {
                        dx *= 3;
                        dy *= 3;
                        this.stamina -= 2;
                        if (this.stamina <= 0) {
                            this.dashing = false;
                            this.stamina = 0;
                        }
                    }

                    this.x += dx * this.speed;
                    this.y += dy * this.speed;

                    // Limites do mapa
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }

                // Calcular direção do mouse
                this.direction = Math.atan2(mouse.y - this.y, mouse.x - this.x);

                // Stand segue o player
                if (this.standActive && this.currentStand) {
                    this.currentStand.x = this.x + Math.cos(this.direction) * 40;
                    this.currentStand.y = this.y + Math.sin(this.direction) * 40;
                }
            }

            draw() {
                // Desenhar player
                ctx.save();
                ctx.translate(this.x, this.y);

                // Efeito de invulnerabilidade
                if (!this.invulnerable || Math.floor(Date.now() / 100) % 2 === 0) {
                    // Corpo do player
                    ctx.fillStyle = '#4488ff';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Rosto (olhos)
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-6, -5, 4, 0, Math.PI * 2);
                    ctx.arc(6, -5, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(-6 + Math.cos(this.direction) * 2, -5 + Math.sin(this.direction) * 2, 2, 0, Math.PI * 2);
                    ctx.arc(6 + Math.cos(this.direction) * 2, -5 + Math.sin(this.direction) * 2, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                // Desenhar Stand se ativo
                if (this.standActive && this.currentStand) {
                    this.currentStand.draw(this);
                }
            }

            attack(target) {
                if (this.attackCooldown <= 0 && !this.barraging) {
                    this.attackCooldown = 15;
                    const dist = Math.hypot(target.x - this.x, target.y - this.y);
                    if (dist < 50) {
                        let damage = 5;
                        if (this.standActive && this.currentStand) {
                            damage = this.currentStand.getM1Damage();
                        }
                        target.takeDamage(damage);
                    }
                }
            }

            heavyPunch(target) {
                if (this.attackCooldown <= 0 && !this.barraging && this.stamina >= 20) {
                    this.attackCooldown = 40;
                    this.stamina -= 20;
                    const dist = Math.hypot(target.x - this.x, target.y - this.y);
                    if (dist < 60) {
                        let damage = 15;
                        if (this.standActive && this.currentStand) {
                            damage = this.currentStand.getHeavyDamage();
                        }
                        target.takeDamage(damage);
                        target.knockback(this.direction, 20);
                    }
                }
            }

            barrage(target) {
                if (!this.barraging && this.stamina >= 30) {
                    this.barraging = true;
                    this.barrageTimer = 40;
                    this.stamina -= 30;
                    this.barrageDamageDealt = 0;
                }
            }

            updateBarrage(target) {
                if (this.barraging && this.barrageTimer % 4 === 0) {
                    const dist = Math.hypot(target.x - this.x, target.y - this.y);
                    if (dist < 50) {
                        let damage = 2;
                        if (this.standActive && this.currentStand) {
                            damage = 3;
                        }
                        target.takeDamage(damage);
                        this.barrageDamageDealt = (this.barrageDamageDealt || 0) + damage;
                    }
                }
            }

            dash() {
                if (!this.dashing && this.dashCooldown <= 0 && this.stamina >= 25) {
                    this.dashing = true;
                    this.dashCooldown = 60;
                    this.stamina -= 25;
                    this.invulnerable = true;
                    this.invulnerableTimer = 15;
                    setTimeout(() => { this.dashing = false; }, 200);
                }
            }

            takeDamage(damage) {
                if (!this.invulnerable) {
                    this.hp -= damage;
                    if (this.hp < 0) this.hp = 0;
                }
            }

            knockback(direction, force) {
                this.x -= Math.cos(direction) * force;
                this.y -= Math.sin(direction) * force;
            }

            useStandArrow() {
                const stands = ['Crazy Diamond', 'The Hand', 'Killer Queen', 'Echoes ACT3', 'Star Platinum'];
                const standName = stands[Math.floor(Math.random() * stands.length)];

                switch (standName) {
                    case 'Crazy Diamond':
                        this.currentStand = new CrazyDiamond();
                        break;
                    case 'The Hand':
                        this.currentStand = new TheHand();
                        break;
                    case 'Killer Queen':
                        this.currentStand = new KillerQueen();
                        break;
                    case 'Echoes ACT3':
                        this.currentStand = new EchoesACT3();
                        break;
                    case 'Star Platinum':
                        this.currentStand = new StarPlatinum();
                        break;
                }

                // Remover flecha do inventário
                const arrowIndex = this.inventory.indexOf('Stand Arrow');
                if (arrowIndex > -1) this.inventory.splice(arrowIndex, 1);

                return standName;
            }
        }

        // ============ CLASSES DOS STANDS ============
        class Stand {
            constructor(name, color) {
                this.name = name;
                this.color = color;
                this.x = 0;
                this.y = 0;
                this.radius = 18;
            }

            getM1Damage() { return 10; }
            getHeavyDamage() { return 20; }
            special1(target, player) {} // Habilidade Z
            special2(target, player) {} // Habilidade X
            getSpecial1Name() { return "Special 1"; }
            getSpecial2Name() { return "Special 2"; }
            getSpecial1Cooldown() { return 120; }
            getSpecial2Cooldown() { return 180; }

            draw(player) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Aura do Stand
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Corpo do Stand
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Olhos do Stand
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-5, -4, 3, 0, Math.PI * 2);
                ctx.arc(5, -4, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class CrazyDiamond extends Stand {
            constructor() {
                super('Crazy Diamond', '#ff69b4');
                this.special1Cooldown = 0;
                this.special2Cooldown = 0;
            }

            getM1Damage() { return 12; }
            getHeavyDamage() { return 25; }
            getSpecial1Name() { return "Heal Self"; }
            getSpecial2Name() { return "Area Heal"; }

            special1(target, player) {
                if (this.special1Cooldown <= 0) {
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                    this.special1Cooldown = 180;
                    return "DORARARA! +30 HP!";
                }
                return null;
            }

            special2(target, player) {
                if (this.special2Cooldown <= 0) {
                    player.hp = Math.min(player.maxHp, player.hp + 15);
                    this.special2Cooldown = 300;
                    return "Healing Area! +15 HP!";
                }
                return null;
            }
        }

        class TheHand extends Stand {
            constructor() {
                super('The Hand', '#0000ff');
                this.special1Cooldown = 0;
                this.special2Cooldown = 0;
            }

            getM1Damage() { return 8; }
            getHeavyDamage() { return 30; }
            getSpecial1Name() { return "Erase Space"; }
            getSpecial2Name() { return "Pull Enemy"; }

            special1(target, player) {
                if (this.special1Cooldown <= 0) {
                    target.takeDamage(20);
                    this.special1Cooldown = 150;
                    return "Space Erased! 20 DMG!";
                }
                return null;
            }

            special2(target, player) {
                if (this.special2Cooldown <= 0) {
                    const angle = Math.atan2(target.y - player.y, target.x - player.x);
                    target.x = player.x + Math.cos(angle) * 40;
                    target.y = player.y + Math.sin(angle) * 40;
                    this.special2Cooldown = 200;
                    return "Pulled enemy!";
                }
                return null;
            }
        }

        class KillerQueen extends Stand {
            constructor() {
                super('Killer Queen', '#ff0000');
                this.special1Cooldown = 0;
                this.special2Cooldown = 0;
                this.bombPlanted = false;
            }

            getM1Damage() { return 10; }
            getHeavyDamage() { return 22; }
            getSpecial1Name() { return "Plant Bomb"; }
            getSpecial2Name() { return "Sheer Heart Attack"; }

            special1(target, player) {
                if (this.special1Cooldown <= 0) {
                    this.bombPlanted = true;
                    this.bombTarget = target;
                    this.special1Cooldown = 100;
                    return "Bomb planted! Click again to detonate!";
                }
                if (this.bombPlanted) {
                    target.takeDamage(25);
                    this.bombPlanted = false;
                    return "BOOM! 25 DMG!";
                }
                return null;
            }

            special2(target, player) {
                if (this.special2Cooldown <= 0) {
                    target.takeDamage(15);
                    this.special2Cooldown = 250;
                    return "Sheer Heart Attack! 15 DMG!";
                }
                return null;
            }
        }

        class EchoesACT3 extends Stand {
            constructor() {
                super('Echoes ACT3', '#00ff00');
                this.special1Cooldown = 0;
                this.special2Cooldown = 0;
            }

            getM1Damage() { return 7; }
            getHeavyDamage() { return 18; }
            getSpecial1Name() { return "3 Freeze"; }
            getSpecial2Name() { return "Sound Blast"; }

            special1(target, player) {
                if (this.special1Cooldown <= 0) {
                    target.slowed = true;
                    target.slowTimer = 180;
                    this.special1Cooldown = 200;
                    return "3 Freeze! Enemy slowed!";
                }
                return null;
            }

            special2(target, player) {
                if (this.special2Cooldown <= 0) {
                    target.takeDamage(12);
                    this.special2Cooldown = 150;
                    return "S-H-I-T! 12 DMG!";
                }
                return null;
            }
        }

        class StarPlatinum extends Stand {
            constructor() {
                super('Star Platinum', '#800080');
                this.special1Cooldown = 0;
                this.special2Cooldown = 0;
                this.timeStopActive = false;
            }

            getM1Damage() { return 15; }
            getHeavyDamage() { return 35; }
            getSpecial1Name() { return "ORA KICK"; }
            getSpecial2Name() { return "TIME STOP"; }

            special1(target, player) {
                if (this.special1Cooldown <= 0) {
                    target.takeDamage(20);
                    target.knockback(player.direction, 30);
                    this.special1Cooldown = 120;
                    return "ORA! 20 DMG!";
                }
                return null;
            }

            special2(target, player) {
                if (this.special2Cooldown <= 0) {
                    this.timeStopActive = true;
                    this.special2Cooldown = 400;
                    setTimeout(() => { this.timeStopActive = false; }, 2000);
                    return "STAR PLATINUM: THE WORLD!";
                }
                return null;
            }
        }

        // ============ CLASSE DOS INIMIGOS ============
        class Enemy {
            constructor(x, y, type = 'thug') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.radius = 18;
                this.hp = type === 'stand_user' ? 80 : 40;
                this.maxHp = this.hp;
                this.speed = type === 'stand_user' ? 2 : 1.5;
                this.damage = type === 'stand_user' ? 8 : 5;
                this.attackCooldown = 0;
                this.slowed = false;
                this.slowTimer = 0;
                this.aggroRange = 150;
                this.knockbackForce = 0;
                this.knockbackAngle = 0;
            }

            update(player) {
                if (this.knockbackForce > 0) {
                    this.x -= Math.cos(this.knockbackAngle) * this.knockbackForce;
                    this.y -= Math.sin(this.knockbackAngle) * this.knockbackForce;
                    this.knockbackForce *= 0.8;
                    if (this.knockbackForce < 0.5) this.knockbackForce = 0;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                    return;
                }

                if (this.slowed) {
                    this.slowTimer--;
                    if (this.slowTimer <= 0) this.slowed = false;
                }

                if (this.attackCooldown > 0) this.attackCooldown--;

                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < this.aggroRange) {
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    const currentSpeed = this.slowed ? this.speed * 0.3 : this.speed;
                    this.x += Math.cos(angle) * currentSpeed;
                    this.y += Math.sin(angle) * currentSpeed;

                    if (dist < 30 && this.attackCooldown <= 0) {
                        player.takeDamage(this.damage);
                        this.attackCooldown = 40;
                    }
                }

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
            }

            draw() {
                ctx.fillStyle = this.type === 'stand_user' ? '#ff4444' : '#ff8844';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Barra de vida do inimigo
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x - 15, this.y - 25, 30 * hpPercent, 4);

                if (this.slowed) {
                    ctx.fillStyle = '#00ffff';
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            takeDamage(damage) {
                this.hp -= damage;
                if (this.hp < 0) this.hp = 0;
            }

            knockback(direction, force) {
                this.knockbackForce = force;
                this.knockbackAngle = direction;
            }

            isDead() {
                return this.hp <= 0;
            }
        }

        // ============ CLASSE DOS NPCS ============
        class NPC {
            constructor(x, y, name, questText, questRequirement, reward) {
                this.x = x;
                this.y = y;
                this.name = name;
                this.questText = questText;
                this.questRequirement = questRequirement;
                this.reward = reward;
                this.radius = 15;
                this.questActive = false;
                this.questComplete = false;
            }

            draw() {
                // Exclamação se tiver quest
                if (!this.questComplete && !this.questActive) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 20px Arial';
                    ctx.fillText('!', this.x - 5, this.y - 20);
                } else if (this.questActive) {
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 20px Arial';
                    ctx.fillText('?', this.x - 5, this.y - 20);
                }

                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Nome do NPC
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.fillText(this.name, this.x - 15, this.y + 30);
            }
        }

        // ============ INICIALIZAÇÃO DO JOGO ============
        const player = new Player(400, 300);

        // Criar NPCs
        const npcs = [
            new NPC(200, 200, 'Jotaro', 'Derrote 3 Vândalos!', { type: 'thug', count: 3 }, { exp: 50, yen: 100, arrow: true }),
            new NPC(600, 200, 'Koichi', 'Derrote 2 Stand Users!', { type: 'stand_user', count: 2 }, { exp: 100, yen: 200, arrow: true }),
        ];

        // Arrays de inimigos
        let enemies = [];
        let questProgress = { thug: 0, stand_user: 0 };

        // Função para spawnar inimigos
        function spawnEnemies() {
            if (enemies.length < 5) {
                const type = Math.random() < 0.6 ? 'thug' : 'stand_user';
                enemies.push(new Enemy(
                    Math.random() * 700 + 50,
                    Math.random() * 500 + 50,
                    type
                ));
            }
        }
        setInterval(spawnEnemies, 3000);

        // ============ CONTROLES ============
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouse.down = true;
            if (e.button === 0) { // Clique esquerdo
                // Encontrar inimigo mais próximo
                let closest = null;
                let minDist = 50;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) player.attack(closest);
            }
        });

        canvas.addEventListener('mouseup', () => { mouse.down = false; });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key.toLowerCase() === 'q') {
                player.standActive = !player.standActive;
                if (player.standActive && !player.currentStand) {
                    showDialogue("Você não tem um Stand! Use uma Flecha primeiro!");
                    player.standActive = false;
                }
            }

            if (e.key.toLowerCase() === 'e') {
                let closest = null;
                let minDist = 50;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) player.barrage(closest);
            }

            if (e.key.toLowerCase() === 'r') {
                let closest = null;
                let minDist = 60;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) player.heavyPunch(closest);
            }

            if (e.key === ' ') {
                e.preventDefault();
                player.dash();
            }

            if (e.key.toLowerCase() === 'f') {
                // Interagir com NPCs
                npcs.forEach(npc => {
                    const dist = Math.hypot(npc.x - player.x, npc.y - player.y);
                    if (dist < 50) {
                        if (!npc.questActive && !npc.questComplete) {
                            npc.questActive = true;
                            questProgress[npc.questRequirement.type] = 0;
                            showDialogue(npc.questText);
                        } else if (npc.questComplete) {
                            showDialogue("Missão completa! Aqui está sua recompensa!");
                        }
                    }
                });
            }

            // Habilidades especiais
            if (e.key.toLowerCase() === 'z' && player.standActive && player.currentStand) {
                let closest = null;
                let minDist = 80;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) {
                    const result = player.currentStand.special1(closest, player);
                    if (result) showDialogue(result);
                }
            }

            if (e.key.toLowerCase() === 'x' && player.standActive && player.currentStand) {
                let closest = null;
                let minDist = 80;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) {
                    const result = player.currentStand.special2(closest, player);
                    if (result) showDialogue(result);
                }
            }

            // Usar flecha (tecla U)
            if (e.key.toLowerCase() === 'u' && player.inventory.includes('Stand Arrow')) {
                const standName = player.useStandArrow();
                showDialogue(`Você despertou: ${standName}!`);
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function showDialogue(text) {
            dialogueText = text;
            dialogueTimer = 150;
        }

        // ============ LOOP DO JOGO ============
        function update() {
            player.update();

            // Atualizar inimigos
            enemies.forEach(enemy => {
                if (player.currentStand && player.currentStand.timeStopActive) {
                    // Time stop: inimigos não se movem
                } else {
                    enemy.update(player);
                }
            });

            // Atualizar barrage
            if (player.barraging) {
                let closest = null;
                let minDist = 50;
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                });
                if (closest) player.updateBarrage(closest);
            }

            // Verificar mortes e progresso de quests
            enemies = enemies.filter(enemy => {
                if (enemy.isDead()) {
                    // Atualizar progresso de quest
                    npcs.forEach(npc => {
                        if (npc.questActive) {
                            if (enemy.type === npc.questRequirement.type) {
                                questProgress[enemy.type]++;
                                if (questProgress[enemy.type] >= npc.questRequirement.count) {
                                    npc.questComplete = true;
                                    npc.questActive = false;
                                    // Dar recompensa
                                    player.exp += npc.reward.exp;
                                    player.yen += npc.reward.yen;
                                    if (npc.reward.arrow) {
                                        player.inventory.push('Stand Arrow');
                                    }
                                    // Subir de nível
                                    if (player.exp >= player.level * 100) {
                                        player.level++;
                                        player.maxHp += 20;
                                        player.hp = player.maxHp;
                                        player.exp = 0;
                                        showDialogue(`Level Up! Nível ${player.level}!`);
                                    }
                                    showDialogue("Missão concluída! Recompensa recebida!");
                                }
                            }
                        }
                    });
                    return false;
                }
                return true;
            });

            // Timer de diálogo
            if (dialogueTimer > 0) dialogueTimer--;
            if (dialogueTimer <= 0) dialogueText = '';

            // Atualizar cooldowns dos stands
            if (player.currentStand) {
                if (player.currentStand.special1Cooldown > 0) player.currentStand.special1Cooldown--;
                if (player.currentStand.special2Cooldown > 0) player.currentStand.special2Cooldown--;
            }
        }

        function draw() {
            // Limpar canvas
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar grid do chão (Morioh)
            ctx.strokeStyle = '#3a3a3a';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Desenhar prédios decorativos
            ctx.fillStyle = '#444';
            ctx.fillRect(50, 50, 80, 80);
            ctx.fillRect(670, 50, 80, 120);
            ctx.fillRect(50, 470, 100, 80);
            ctx.fillRect(650, 400, 100, 150);

            // Desenhar NPCs
            npcs.forEach(npc => npc.draw());

            // Desenhar inimigos
            enemies.forEach(enemy => enemy.draw());

            // Desenhar jogador
            player.draw();

            // ============ HUD ============
            // Barra de HP
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(10, 10, 200, 20);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(10, 10, 200 * (player.hp / player.maxHp), 20);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(10, 10, 200, 20);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText(`HP: ${Math.floor(player.hp)}/${player.maxHp}`, 15, 25);

            // Barra de Stamina
            ctx.fillStyle = '#444';
            ctx.fillRect(10, 35, 200, 15);
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(10, 35, 200 * (player.stamina / player.maxStamina), 15);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(10, 35, 200, 15);
            ctx.fillText(`Stamina: ${Math.floor(player.stamina)}`, 15, 46);

            // Informações
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText(`Nível: ${player.level} | Exp: ${player.exp}/${player.level * 100}`, 10, 75);
            ctx.fillText(`¥${player.yen}`, 10, 95);

            // Stand atual
            if (player.currentStand) {
                ctx.fillText(`Stand: ${player.currentStand.name}`, 10, 115);
                if (player.standActive) {
                    ctx.fillStyle = '#ffd700';
                    ctx.fillText('Stand: ATIVO', 10, 135);
                }
            }

            // Inventário
            ctx.fillText(`Inventário: ${player.inventory.join(', ') || 'Vazio'}`, 10, 155);
            if (player.inventory.includes('Stand Arrow')) {
                ctx.fillStyle = '#ffd700';
                ctx.fillText('Pressione U para usar a Flecha!', 10, 175);
            }

            // Controles adicionais
            ctx.fillStyle = '#aaa';
            ctx.font = '12px Arial';
            if (player.standActive && player.currentStand) {
                const stand = player.currentStand;
                ctx.fillText(`Z: ${stand.getSpecial1Name()} (CD:${stand.special1Cooldown})`, 10, 195);
                ctx.fillText(`X: ${stand.getSpecial2Name()} (CD:${stand.special2Cooldown})`, 10, 210);
            }

            // Diálogo
            if (dialogueText && dialogueTimer > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(100, 500, 600, 60);
                ctx.strokeStyle = '#ffd700';
                ctx.strokeRect(100, 500, 600, 60);
                ctx.fillStyle = '#fff';
                ctx.font = '18px Arial';
                ctx.fillText(dialogueText, 110, 535);
            }

            // Indicador de missão
            npcs.forEach(npc => {
                if (npc.questActive) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '14px Arial';
                    ctx.fillText(
                        `Progresso: ${questProgress[npc.questRequirement.type] || 0}/${npc.questRequirement.count} ${npc.questRequirement.type}`,
                        10, 560
                    );
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============ INICIAR JOGO ============
        showDialogue("Bem-vindo a Morioh! Encontre NPCs (!) para missões. Use WASD para mover.");
        spawnEnemies();
        spawnEnemies();
        gameLoop();

        console.log('🎮 Morioh Bizarre Adventure - JoJo Parte 4');
        console.log('🕹️ Controles: WASD mover | Mouse mirar/atacar | Q Stand | E Barrage | R Heavy Punch');
        console.log('⚡ Z/X Habilidades especiais | Espaço Dash | F Interagir | U Usar Flecha');
    </script>
</body>
</html>
